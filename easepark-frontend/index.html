<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta tags -->
    <title>EasePark — Smart Parking, Find &amp; Book Spots in Real Time</title>
    <meta
      name="description"
      content="EasePark helps you find, reserve, and pay for parking spots in real time. Locate nearby lots on a map, book a spot in seconds, and skip the hassle of circling for parking."
    />
    <meta name="keywords" content="smart parking, book parking, parking spots, reserve parking, parking app, find parking, EasePark" />
    <meta name="author" content="EasePark" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://easepark.app/" />

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EasePark" />
    <meta property="og:url" content="https://easepark.app/" />
    <meta property="og:title" content="EasePark — Smart Parking, Find &amp; Book Spots in Real Time" />
    <meta
      property="og:description"
      content="Find, reserve, and pay for parking spots in real time. Locate nearby lots on a map and book a spot in seconds."
    />
    <meta property="og:image" content="https://easepark.app/og-image.png" />
    <meta property="og:image:alt" content="EasePark — smart parking made simple" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://easepark.app/" />
    <meta name="twitter:title" content="EasePark — Smart Parking, Find &amp; Book Spots in Real Time" />
    <meta
      name="twitter:description"
      content="Find, reserve, and pay for parking spots in real time. Locate nearby lots on a map and book a spot in seconds."
    />
    <meta name="twitter:image" content="https://easepark.app/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Structured data (JSON-LD) — Organization, WebSite, WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://easepark.app/#organization",
          "name": "EasePark",
          "url": "https://easepark.app/",
          "logo": "https://easepark.app/favicon.png",
          "description": "EasePark is a smart parking platform to find, reserve, and pay for parking spots in real time.",
          "email": "support.easepark@gmail.com",
          "sameAs": [
            "https://github.com/23f3002142/Easepark"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://easepark.app/#website",
          "url": "https://easepark.app/",
          "name": "EasePark",
          "description": "Find, reserve, and pay for parking spots in real time.",
          "publisher": { "@id": "https://easepark.app/#organization" }
        },
        {
          "@type": "WebApplication",
          "name": "EasePark",
          "url": "https://easepark.app/",
          "applicationCategory": "TravelApplication",
          "operatingSystem": "Web",
          "browserRequirements": "Requires a modern web browser with JavaScript enabled.",
          "description": "Smart parking web app: see live availability on a map, book a spot in seconds with OTP verification, and pay securely — only for the time you park.",
          "publisher": { "@id": "https://easepark.app/#organization" },
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "INR",
            "description": "Free to sign up and browse. You only pay for the parking time you book."
          }
        }
      ]
    }
    </script>

    <!-- Structured data (JSON-LD) — FAQ (keep in sync with the FAQ section on the home page) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is EasePark?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EasePark is a smart parking platform that lets you find, reserve, and pay for parking spots in real time. You can see live availability on an interactive map, book a spot in seconds, and pay only for the time you park."
          }
        },
        {
          "@type": "Question",
          "name": "How do I book a parking spot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Create a free account, search by location or browse the live map, pick an available spot, and confirm your booking with an OTP. Then just drive in and park — no cash, no queues."
          }
        },
        {
          "@type": "Question",
          "name": "Is my payment secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All payments are processed through Razorpay, a trusted and PCI-compliant payment gateway. We never store your card, UPI, or bank details on our servers."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel or release a booking?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. You can release a booked spot from your dashboard at any time. You are charged only for the time you actually parked, based on the applicable pricing."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to create an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, a free account is required to book and manage parking. You can sign up with your email or use Google Sign-In for a one-tap experience."
          }
        },
        {
          "@type": "Question",
          "name": "Is EasePark free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Creating an account, browsing lots, and viewing availability are completely free. You only pay for the parking time you book."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </body>
</html>
