services:
  # ── Flask Backend ──
  backend:
    build: .
    container_name: easepark_backend
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=http://localhost:5173
      - BASE_URL=
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/venv
      - /app/__pycache__
    depends_on:
      - redis
    # Use Flask dev server for local development (auto-reload on code changes)
    command: flask run --host=0.0.0.0 --port=5000 --debug

  # ── Vue Frontend (Vite dev server) ──
  frontend:
    build:
      context: ./easepark-frontend
      dockerfile: Dockerfile.dev
    container_name: easepark_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./easepark-frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
      - VITE_PROXY_TARGET=http://backend:5000
    depends_on:
      - backend

  # ── Redis ──
  redis:
    image: "redis:alpine"
    container_name: easepark_redis
    ports:
      - "6379:6379"
